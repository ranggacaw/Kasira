<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Kasira Offline</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: #0f172a;
                color: #e2e8f0;
                font-family: Arial, sans-serif;
            }

            main {
                max-width: 32rem;
                padding: 2rem;
                text-align: center;
            }

            h1 {
                margin-bottom: 0.75rem;
            }

            p {
                color: #cbd5e1;
                line-height: 1.6;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Kasira is offline</h1>
            <p>
                Cached pages remain available, but actions that require a live
                connection will resume once the network returns.
            </p>
        </main>
    </body>
</html>
